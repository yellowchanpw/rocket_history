<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>로켓 상세 | Rocket Detail</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body id="top">
    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="index.html#top" aria-label="홈으로">
          <span class="brand__logo" aria-hidden="true">🚀</span>
          <span class="brand__text">로켓의 역사</span>
        </a>

        <nav class="nav" aria-label="주요 섹션">
          <a href="index.html#timeline">타임라인</a>
          <a href="index.html#milestones">주요 이정표</a>
          <a href="index.html#gallery">대표 로켓</a>
        </nav>

        <button id="themeBtn" class="btn btn--ghost" type="button" aria-label="테마 전환">🌙</button>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <a class="detail-link" href="index.html#timeline">← 타임라인으로</a>

        <div class="detail-card detail-card--spaced">
          <h1 id="rTitle" class="detail-title">로딩 중...</h1>
          <p id="rSubtitle" class="detail-subtitle"></p>

          <!-- 🔥 50 / 50 레이아웃 시작 -->
          <div class="detail-split">

            <!-- 왼쪽: 이미지 -->
            <figure class="detail-media">
              <img id="rImg" class="detail-img" alt="" loading="lazy" />
              <figcaption id="rImgCredit" class="detail-credit"></figcaption>
            </figure>

            <!-- 오른쪽: 텍스트 카드 -->
            <div class="grid detail-grid">

              <article class="card">
                <h3>개요</h3>
                <p id="rOverview" class="preline"></p>
              </article>

              <article class="card">
                <h3>핵심 기술</h3>
                <p id="rTech" class="preline"></p>
              </article>

              <article class="card">
                <h3>역사적 의미</h3>
                <p id="rImpact" class="preline"></p>
              </article>

              <article class="card">
                <h3>키워드</h3>
                <p id="rTags"></p>
              </article>

            </div>
          </div>
          <!-- 🔥 50 / 50 레이아웃 끝 -->

        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <span>© Rocket History (Demo)</span>
        <a href="#top" class="footer__link">맨 위로</a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
